<div class="article-card-content" style="margin-left:400px;margin-top:30px;width:1000px;">
    <div class="row row-cols-1 row-cols-md-3 g-4">
        {{range $key, $article := .}}
        <div class="col">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">{{$article.Title}}</h5>
                    {{ if ($article.Content | lenBiggerThan160) }}
                    <p class="card-text">{{ $article.Content | getFirst160 }}</p>
                    {{ else}}
                    <p class="card-text">{{ $article.Content }}</p>
                    <a class="card-link" href="focusedRead/id/{{$article.ID}}">Read {{$article.ID}}</a>
                    {{ end}}
                </div>
            </div>
        </div>
        {{end}}
    </div>
</div>
