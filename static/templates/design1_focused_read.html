<div class="container" id="body-content">
    <div class="row">
        <div class="col-8" id="article-content-column">
            <div id="article-text">
                {{ $pinyins := .pinyins }}
                {{ $tokens := .tokens }}
                <div class="row" id="article-tokens">
                    <p> {{ range $key, $value := $tokens }}
                        <ruby style="display:inline;">
                            {{ $value}}
                            <rp>(</rp>
                            <rt>{{ index $pinyins $key }}</rt>
                            <rp>)</rp>
                        </ruby>
                        {{ end }}
                    </p>
                </div>
            </div>
        </div>
        <div class="col-4" id="content-lookups-column">
            <div id="lookup-text">
                {{ range .lookups }}
                <div class="list-group">
                    <a class="list-group-item list-group-item-action" href="#">
                        <div class="d-flex w-100 justify-content-between">
                            <h5 class="mb-1">{{ .Hanzi }}</h5>
                            <small class="text-muted"></small>
                        </div>
                        <p class="mb-1">{{ .Pinyin }}</p>
                        <small class="text-muted">{{.EnLookup }}</small>
                    </a>
                </div>
                {{end}}
            </div>
        </div>
    </div>
</div>
